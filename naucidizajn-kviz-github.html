<!DOCTYPE html>
<html lang="sr-Latn-RS">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Nauči Dizajn — Quiz Assets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #232421;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .container {
      max-width: 640px;
      text-align: center;
    }
    h1 {
      color: #DBFF00;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 16px;
    }
    p {
      color: #D3D3D3;
      font-size: 16px;
      margin-bottom: 12px;
    }
    a {
      color: #DBFF00;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .files {
      margin-top: 24px;
      padding: 16px;
      background: #363B1E;
      border-radius: 8px;
      text-align: left;
      font-family: monospace;
      font-size: 14px;
    }
    .files div { margin: 4px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nauči Dizajn — Quiz Assets</h1>
    <p>Repository sadrži custom code multi-step quiz formu.</p>
    <p>Forma je embed-ovana na <a href="https://www.naucidizajn.com">naucidizajn.com</a>.</p>
    <div class="files">
      <div>📄 <a href="naucidizajn-kviz.css">naucidizajn-kviz.css</a></div>
      <div>📄 <a href="naucidizajn-kviz.js">naucidizajn-kviz.js</a></div>
    </div>
  </div>
</body>
</html>
